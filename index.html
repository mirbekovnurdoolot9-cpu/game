    <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ретро Змейка</title>
    <style>
        body {
            margin: 0;
            background-color: #111424;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
            color: #00ff66;
            text-shadow: 0 0 10px #00ff66;
        }
        #score-board {
            font-size: 20px;
            margin-bottom: 15px;
        }
        #gameCanvas {
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.2);
            background-color: #05070f;
        }
        .controls {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>ЗМЕЙКА</h1>
    <div id="score-board">Счет: <span id="score">0</span> | Рекорд: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">Управление: Стрелочки или WASD на клавиатуре</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("score");
const bestElement = document.getElementById("best");

// Размер одной ячейки на поле
const gridSize = 20;
const tileCount = canvas.width / gridSize;

// Параметры змейки и игры
let snake = [];
let food = { x: 0, y: 0 };
let dx = gridSize; // скорость по X
let dy = 0;        // скорость по Y
let score = 0;
let bestScore = 0;
let gameInterval;

// Инициализация/Сброс игры
function initGame() {
    snake = [
        { x: gridSize * 5, y: gridSize * 5 },
        { x: gridSize * 4, y: gridSize * 5 },
        { x: gridSize * 3, y: gridSize * 5 }
    ];
    dx = gridSize;
    dy = 0;
    score = 0;
    scoreElement.innerText = score;
    spawnFood();
    
    // Очищаем старый таймер, если он был, и запускаем игру со скоростью 100мс на кадр
    clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, 100);
}

// Генерация еды в случайном месте (не на змейке)
function spawnFood() {
    food.x = Math.floor(Math.random() * tileCount) * gridSize;
    food.y = Math.floor(Math.random() * tileCount) * gridSize;

    // Если еда попала на тело змейки, пересоздаем ее
    for (let cell of snake) {
        if (cell.x === food.x && cell.y === food.y) {
            spawnFood();
            break;
        }
    }
}

// Главный цикл
function gameLoop() {
    moveSnake();

    if (checkGameOver()) {
        if (score > bestScore) {
            bestScore = score;
            bestElement.innerText = bestScore;
        }
        alert("Игра окончена! Нажмите ОК, чтобы начать заново.");
        initGame();
        return;
    }

    checkFoodCollision();
    draw();
}

// Движение змейки
function moveSnake() {
    // Создаем новую голову на основе текущей скорости
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };
    // Добавляем её в начало массива
    snake.unshift(head);
    // Удаляем хвост (если змейка не съела еду, этот шаг сбалансирует длину в checkFoodCollision)
    snake.pop();
}

// Проверка столкновений
function checkGameOver() {
    const head = snake[0];

    // Столкновение со стенами
    if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
        return true;
    }

    // Столкновение со своим хвостом (проверяем со 2-го элемента)
    for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
            return true;
        }
    }
    return false;
}

// Проверка поедания еды
function checkFoodCollision() {
    const head = snake[0];
    if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.innerText = score;
        spawnFood();
        
        // Увеличиваем змейку: просто дублируем последний элемент хвоста
        const tail = { ...snake[snake.length - 1] };
        snake.push(tail);
    }
}

// Отрисовка всех элементов
function draw() {
    // Очистка поля
    ctx.fillStyle = "#05070f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Рисуем сетку (едва заметную для атмосферы)
    ctx.strokeStyle = "#12172b";
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += gridSize) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
    }

    // Рисуем еду (красный светящийся квадрат)
    ctx.fillStyle = "#ff3366";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#ff3366";
    ctx.fillRect(food.x + 2, food.y + 2, gridSize - 4, gridSize - 4);

    // Рисуем змейку (зеленая со свечением)
    ctx.shadowBlur = 8;
    ctx.shadowColor = "#00ff66";
    
    snake.forEach((cell, index) => {
        // Голова чуть ярче хвоста
        ctx.fillStyle = index === 0 ? "#00ff66" : "#00aa44";
        ctx.fillRect(cell.x + 1, cell.y + 1, gridSize - 2, gridSize - 2);
    });

    // Сброс тени, чтобы не тормозило
    ctx.shadowBlur = 0;
}

// Обработка нажатий клавиш
window.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();
    
    // Запрещаем разворот на 180 градусов (например, влево, если ползем вправо)
    if ((key === "arrowleft" || key === "a") && dx === 0) {
        dx = -gridSize;
        dy = 0;
    } else if ((key === "arrowup" || key === "w") && dy === 0) {
        dx = 0;
        dy = -gridSize;
    } else if ((key === "arrowright" || key === "d") && dx === 0) {
        dx = gridSize;
        dy = 0;
    } else if ((key === "arrowdown" || key === "s") && dy === 0) {
        dx = 0;
        dy = gridSize;
    }
});

// Запуск игры при загрузке страницы
initGame();
</script>
</body>
</html>
